  <style>
    :root {
      --brand: #075f9b;
      --brand-dark: #073f63;
      --brand-deep: #054667;
      --brand-soft: #e8f4fb;
      --ink: #09253d;
      --muted: #64758a;
      --line: #c9d8e5;
      --surface: #ffffff;
      --canvas: #eef4f8;
      --side: #e4f0f5;
      --danger: #b42318;
      --success: #087443;
      --shadow: 0 26px 70px rgba(2, 22, 37, .24);
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 255, 255, .13), transparent 28%),
        linear-gradient(145deg, #06324f 0%, #075b87 44%, #0a7aab 100%);
    }

    button,
    select,
    input {
      font: inherit;
    }

    .login-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      align-content: center;
      row-gap: 14px;
      padding: clamp(18px, 4vw, 42px);
    }

    .login-footer {
      margin: 0;
      color: #6b7e8c;
      font-size: .74rem;
      font-weight: 700;
      letter-spacing: .03em;
      text-align: center;
    }

    .login-screen.is-hidden,
    .app-screen.is-hidden {
      display: none;
    }

    .login-shell {
      width: min(100%, 620px);
      display: grid;
      gap: clamp(18px, 4vw, 28px);
      align-items: center;
      justify-items: center;
    }

    .brand-panel {
      width: min(100%, 430px);
      display: grid;
      place-items: center;
    }

    .logo-mark {
      width: min(100%, 430px);
      height: auto;
      display: block;
      padding: clamp(16px, 4vw, 24px) clamp(18px, 5vw, 30px);
      background: rgba(255, 255, 255, .96);
      border-radius: 8px;
      box-shadow: 0 18px 54px rgba(0, 0, 0, .18);
    }

    .brand-panel h1,
    .brand-panel p {
      display: none;
    }

    .login-card {
      width: min(100%, 620px);
      background: var(--surface);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: clamp(26px, 5vw, 46px);
      border: 1px solid rgba(255, 255, 255, .72);
    }

    .card-head {
      margin-bottom: 30px;
    }

    .card-head h2 {
      margin: 0 0 8px;
      font-size: 2rem;
      letter-spacing: 0;
    }

    .card-head p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    form {
      display: grid;
      gap: 18px;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 750;
      color: #17334c;
    }

    .field {
      position: relative;
    }

    .field-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      width: 32px;
      height: 32px;
      transform: translateY(-50%);
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .field-icon img {
      max-width: 32px;
      max-height: 32px;
      object-fit: contain;
      display: block;
    }

    select,
    input {
      width: 100%;
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 82px 0 58px;
      color: var(--ink);
      background: #fbfdff;
      font-size: 1rem;
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }

    select:focus,
    input:focus {
      border-color: var(--brand);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(7, 95, 155, .13);
    }

    .password-toggle {
      position: absolute;
      top: 50%;
      right: 10px;
      width: 68px;
      height: 38px;
      transform: translateY(-50%);
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--brand-dark);
      cursor: pointer;
      font-size: 1rem;
      font-weight: 800;
    }

    .password-toggle:hover {
      background: var(--brand-soft);
    }

    .primary-btn {
      min-height: 58px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(135deg, #0876b2, #065f97);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 850;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(7, 95, 155, .27);
      transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
    }

    .primary-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow: 0 18px 34px rgba(7, 95, 155, .32);
    }

    .primary-btn:disabled {
      cursor: wait;
      opacity: .72;
      transform: none;
    }

    .message {
      min-height: 24px;
      margin-top: 4px;
      font-weight: 700;
      line-height: 1.45;
    }

    .message.error {
      color: var(--danger);
    }

    .message.success {
      color: var(--success);
    }

    .app-screen {
      min-height: 100vh;
      background: var(--canvas);
      color: var(--ink);
      display: grid;
      grid-template-rows: 100px 1fr;
    }

    .app-topbar {
      height: 100px;
      background: linear-gradient(90deg, var(--brand-deep), #0a6f9f);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 0 40px;
      box-shadow: 0 2px 14px rgba(4, 29, 45, .18);
    }

    .app-brand {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .menu-toggle {
      display: block;
      width: 52px;
      height: 52px;
      border: 1px solid rgba(255, 255, 255, .36);
      border-radius: 8px;
      background: rgba(255, 255, 255, .08);
      color: #fff;
      cursor: pointer;
      font-size: 2rem;
      line-height: 1;
    }

    .app-logo {
      width: 108px;
      height: 56px;
      object-fit: contain;
      border-radius: 8px;
      background: rgba(255, 255, 255, .95);
      padding: 6px;
    }

    .app-title small {
      display: block;
      color: #78e7ff;
      font-size: .78rem;
      font-weight: 900;
      letter-spacing: .16em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .app-title h1 {
      margin: 0;
      color: #fff;
      font-size: 1.45rem;
      line-height: 1.1;
    }

    .app-title span {
      display: block;
      margin-top: 8px;
      color: rgba(255, 255, 255, .86);
      font-size: .92rem;
    }

    .user-box {
      text-align: right;
      min-width: 190px;
    }

    .user-box strong {
      display: block;
      font-size: 1rem;
      color: #fff;
    }

    .user-box span {
      display: block;
      margin-top: 4px;
      color: #c7f3ff;
      font-size: .8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .logout-btn {
      margin-top: 10px;
      padding: 0;
      border: 0;
      border-bottom: 1px solid #fff;
      background: transparent;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    .app-body {
      min-height: 0;
      display: grid;
      grid-template-columns: 74px 1fr;
      transition: grid-template-columns .18s ease;
    }

    .app-screen.sidebar-expanded .app-body {
      grid-template-columns: 220px 1fr;
    }

    .module-sidebar {
      background: var(--side);
      border-right: 1px solid #d2e1e9;
      padding: 18px 10px;
      overflow: hidden;
    }

    .module-sidebar h2 {
      margin: 0 0 28px;
      color: #496575;
      font-size: .9rem;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .module-list {
      display: grid;
      gap: 12px;
    }

    .module-link {
      min-height: 48px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 0;
      background: transparent;
      color: #14344c;
      cursor: pointer;
      text-align: left;
      padding: 4px 2px;
      font-size: 1rem;
      border-radius: 8px;
    }

    .module-link strong,
    .module-link small {
      display: block;
    }

    .module-link small {
      margin-top: 4px;
      color: #6b7e8c;
      font-size: .76rem;
      line-height: 1.3;
    }

    .module-link.module-logistica {
      min-height: 58px;
      align-items: center;
      flex-direction: row;
      justify-content: flex-start;
      gap: 10px;
      padding: 8px 4px;
      color: #14344c;
      background: transparent;
      box-shadow: none;
    }

    .module-link.module-logistica:hover,
    .module-link.module-logistica.is-active {
      color: var(--brand);
      transform: none;
    }

    .module-logistica .module-card-icon {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      font-size: 1.65rem;
    }

    .module-logistica .module-copy strong {
      font-size: .98rem;
      letter-spacing: .02em;
    }

    .module-logistica .module-copy small {
      color: #6b7e8c;
      font-size: .72rem;
    }

    .app-screen:not(.sidebar-expanded) .module-sidebar {
      padding-left: 12px;
      padding-right: 12px;
    }

    .app-screen:not(.sidebar-expanded) .module-sidebar h2,
    .app-screen:not(.sidebar-expanded) .module-copy,
    .app-screen:not(.sidebar-expanded) .module-link > span:not(.module-card-icon) {
      display: none;
    }

    .app-screen:not(.sidebar-expanded) .module-link {
      justify-content: center;
      padding-left: 0;
      padding-right: 0;
    }

    .module-link:hover,
    .module-link.is-active {
      color: var(--brand);
    }

    .module-link img {
      width: 40px;
      height: 40px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .module-link .module-symbol {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      font-size: 1.55rem;
      line-height: 1;
    }

    .module-workspace {
      min-width: 0;
      min-height: calc(100vh - 100px);
      background: #f2f7fb;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .workspace-head {
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 22px 32px;
      border-bottom: 1px solid #dce7ee;
      background: rgba(255, 255, 255, .56);
    }

    .workspace-head h2 {
      margin: 0;
      font-size: 1.35rem;
      color: #12324a;
    }

    .workspace-head span {
      color: var(--muted);
      font-weight: 700;
    }

    .blank-panel {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      color: #7b8fa0;
      text-align: center;
    }

    .blank-panel.module-host {
      display: block;
      padding: 0;
      text-align: left;
      background: #fff;
      overflow: auto;
      position: relative;
    }

    .module-frame {
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 174px);
      border: 0;
      display: block;
      background: #fff;
      transform-origin: top left;
    }

    .blank-panel p {
      margin: 0;
      max-width: 520px;
      line-height: 1.55;
    }

    .bottom-nav {
      display: none;
    }

    .content-zoom-float {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 25;
      display: flex;
      align-items: center;
      gap: 4px;
      background: #fff;
      border: 1px solid #c7d8e4;
      border-radius: 999px;
      padding: 5px;
      box-shadow: 0 10px 26px rgba(6, 43, 73, .18);
    }

    .content-zoom-float[hidden] {
      display: none;
    }

    .content-zoom-float button {
      min-width: 36px;
      height: 36px;
      padding: 0 10px;
      border-radius: 999px;
      border: 0;
      background: transparent;
      color: #12324a;
      font-weight: 900;
      font-size: .85rem;
      cursor: pointer;
      line-height: 1;
    }

    .content-zoom-float button:hover {
      background: #eef6fb;
    }

    .content-zoom-float button:disabled {
      opacity: .35;
      cursor: default;
    }

    #zoomResetBtn {
      min-width: 48px;
      color: #506b80;
      font-weight: 800;
    }



    html,
    body {
      min-height: 100%;
      overflow-x: hidden;
    }

    .app-screen {
      min-height: 100vh;
      background: var(--canvas);
      color: var(--ink);
      display: grid;
      grid-template-rows: 72px 1fr;
    }

    .app-topbar {
      height: 72px;
    }

    .app-title small,
    .app-title span {
      display: none;
    }

    .app-title h1 {
      font-size: 1.18rem;
    }

    .module-sidebar {
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-width: thin;
    }

    .module-sidebar h2,
    .workspace-head {
      display: none;
    }

    .module-workspace {
      min-height: calc(100vh - 72px);
      grid-template-rows: 1fr;
    }

    .module-frame {
      min-height: calc(100vh - 72px);
    }

    .module-group {
      border-bottom: 1px solid rgba(20,52,76,.08);
      padding-bottom: 10px;
    }

    .group-toggle {
      width: 100%;
      min-height: 50px;
      border: 0;
      background: rgba(7, 95, 155, .08);
      color: #075f9b;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      border-radius: 8px;
      padding: 7px 10px;
      text-align: left;
      font-weight: 900;
    }

    .group-toggle:hover,
    .module-group.is-open .group-toggle {
      color: var(--brand);
      background: rgba(7,95,155,.13);
    }

    .group-icon,
    .module-symbol {
      width: 34px;
      min-width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      font-size: 1.3rem;
    }    .group-icon img {
      width: 30px;
      height: 30px;
      object-fit: contain;
    }



    .group-name {
      flex: 1;
      min-width: 0;
    }

    .group-caret {
      font-size: .8rem;
      transition: transform .18s ease;
    }

    .module-group.is-open .group-caret {
      transform: rotate(90deg);
    }

    .group-items {
      display: none;
      padding: 8px 0 4px 20px;
      gap: 6px;
    }

    .module-group.is-open .group-items {
      display: grid;
    }

    .group-items .module-link {
      min-height: 42px;
      font-size: .92rem;
      padding: 5px 4px;
    }

    .app-screen:not(.sidebar-expanded) .app-body {
      grid-template-columns: 74px 1fr;
    }

    .app-screen:not(.sidebar-expanded) .group-name,
    .app-screen:not(.sidebar-expanded) .group-caret,
    .app-screen:not(.sidebar-expanded) .group-items {
      display: none;
    }

    .app-screen:not(.sidebar-expanded) .group-toggle {
      justify-content: center;
      padding-left: 0;
      padding-right: 0;
    }

    .app-screen.sidebar-expanded .group-name,
    .app-screen.sidebar-expanded .group-caret {
      display: inline-flex;
    }

    @media (max-width: 850px) {
      .app-screen {
        grid-template-rows: 72px 1fr;
      }

      .app-topbar {
        height: 72px;
      }

      .app-body {
        display: grid;
        grid-template-columns: 1fr;
      }

      .module-sidebar {
        display: block;
        position: fixed;
        top: 72px;
        left: 0;
        bottom: 0;
        width: min(82vw, 320px);
        z-index: 40;
        transform: translateX(-105%);
        transition: transform .18s ease;
        box-shadow: 18px 0 50px rgba(0,0,0,.22);
      }

      .app-screen.sidebar-open .module-sidebar {
        transform: translateX(0);
      }

      .app-screen.sidebar-open::after {
        content: "";
        position: fixed;
        inset: 72px 0 0;
        background: rgba(0,0,0,.22);
        z-index: 30;
      }

      .module-workspace {
        min-height: calc(100vh - 72px);
        padding-bottom: 0;
      }

      .module-frame {
        min-height: calc(100vh - 72px);
      }

      .bottom-nav {
        display: none !important;
      }
    }

    @media (max-width: 850px) {
      .login-screen {
        place-items: start center;
      }

      .login-shell {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .brand-panel {
        min-height: auto;
        align-items: center;
        text-align: center;
        padding-top: 8px;
      }

      .logo-mark {
        width: min(320px, 100%);
        margin-bottom: 18px;
      }

      .brand-panel p {
        display: none;
      }

      .app-screen {
        grid-template-rows: 86px 1fr;
      }

      .app-topbar {
        height: 86px;
        padding: 0 14px;
      }

      .menu-toggle {
        display: block;
      }

      .app-logo {
        width: 62px;
        height: 50px;
      }

      .app-title small,
      .app-title span {
        display: none;
      }

      .app-title h1 {
        font-size: 1.1rem;
      }

      .user-box {
        min-width: 128px;
      }

      .user-box strong {
        font-size: .9rem;
      }

      .app-body {
        display: block;
      }

      .module-sidebar {
        display: none;
      }

      .module-workspace {
        min-height: calc(100vh - 86px);
        padding-bottom: 82px;
      }

      .workspace-head {
        display: none;
      }

      .bottom-nav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        min-height: 64px;
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: 1fr;
        gap: 4px;
        padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
        background: rgba(255, 255, 255, .96);
        border-top: 1px solid #d7e1e8;
        z-index: 10;
      }

      .content-zoom-float {
        bottom: calc(76px + env(safe-area-inset-bottom));
        right: 12px;
      }

      .bottom-nav .module-link {
        min-height: 54px;
        justify-content: center;
        gap: 3px;
        flex-direction: column;
        font-size: .74rem;
        padding: 4px;
      }

      .bottom-nav .module-link img {
        width: 30px;
        height: 30px;
      }

      .bottom-nav .module-link.module-logistica {
        min-height: 58px;
        padding: 4px;
        background: transparent;
        box-shadow: none;
        color: #14344c;
      }

      .bottom-nav .module-logistica .module-card-icon {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        font-size: 1rem;
        box-shadow: none;
      }

      .bottom-nav .module-logistica .module-copy strong {
        font-size: .74rem;
        color: #14344c;
      }

      .bottom-nav .module-logistica .module-copy small {
        display: none;
      }

      .module-frame {
        min-height: calc(100vh - 168px);
      }
    }

    @media (max-width: 520px) {
      .login-screen {
        padding: 18px 12px;
      }

      .login-card {
        padding: 24px 18px;
      }
    }

    /* Final responsive overrides for the unified module menu. */
    @media (max-width: 850px) {
      .login-shell {
        width: min(100%, 620px);
        justify-items: center;
      }

      .brand-panel {
        width: min(100%, 400px);
        padding-top: 0;
      }

      .logo-mark {
        width: min(100%, 400px);
        margin-bottom: 0;
      }

      .app-body {
        display: grid;
        grid-template-columns: 1fr;
      }

      .module-sidebar {
        display: block;
        position: fixed;
        top: 86px;
        left: 0;
        bottom: 0;
        width: min(84vw, 260px);
        z-index: 40;
        transform: translateX(-105%);
        transition: transform .18s ease;
        box-shadow: 18px 0 50px rgba(0, 0, 0, .22);
      }

      .app-screen.sidebar-open .module-sidebar {
        transform: translateX(0);
      }

      .app-screen.sidebar-open .group-name,
      .app-screen.sidebar-open .group-caret {
        display: inline-flex;
      }

      .app-screen.sidebar-open .module-group.is-open .group-items {

    const ICE_API_URL = 'https://script.google.com/macros/s/AKfycbxW_bcqSmzevC4SEgXOjX3JRUchBD7Bu3HHLSYamQ367Ie0W46ucQvHNrp7ad1ykk_B/exec';
    function isLocalEnv() {
      return /^(localhost|127\.)/i.test(location.hostname);
    }
    function appEnv() {
      return isLocalEnv() ? 'local' : 'prod';
    }
    const SESSION_KEY = 'opaustro_session';
    const ACTIVE_MODULE_KEY = 'opaustro_active_module';
    const SESSION_TIMEOUT_MS = 5 * 60 * 1000;
    const APP_VERSION = '1.0.2';
    const APP_RELEASE = 'OPAUSTRO v1.0.2';
    const APP_RELEASE_KEY = '1.0.2';
    const RELEASE_KEY = 'opaustro_release_version';
    let inactivityTimer = null;
    let heartbeatTimer = null;
    let icePreparationPromise = null;

    function readStored(key) {
      try { return localStorage.getItem(key) || sessionStorage.getItem(key); }
      catch (error) { try { return sessionStorage.getItem(key); } catch (inner) { return null; } }
    }

    function writeStored(key, value) {
      try { localStorage.setItem(key, value); } catch (error) {}
      try { sessionStorage.setItem(key, value); } catch (error) {}
    }

    function removeStored(key) {
      try { localStorage.removeItem(key); } catch (error) {}
      try { sessionStorage.removeItem(key); } catch (error) {}
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>'"]/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", "\"": "&quot;" })[char]);
    }

    async function readJsonResponse(response, serviceName) {
      const raw = await response.text();
      const trimmed = String(raw || "").trim();
      if (!trimmed) throw new Error((serviceName || "API") + " no devolvió datos.");
      if (trimmed[0] === "<") throw new Error((serviceName || "API") + " devolvió HTML en lugar de JSON. Verifica que la URL /exec publicada sea correcta.");
      try {
        return JSON.parse(trimmed);
      } catch (error) {
        throw new Error((serviceName || "API") + " no devolvió JSON válido: " + trimmed.slice(0, 140));
      }
    }
    function isInstalledApp() {
      return window.matchMedia("(display-mode: standalone)").matches ||
        window.matchMedia("(display-mode: fullscreen)").matches ||
        window.navigator.standalone === true;
    }

    function releaseKeyOf(release, current) {
      const raw = String((release && (release.releaseKey || release.channelVersion)) || current || APP_VERSION || APP_RELEASE_KEY);
      const match = raw.match(/\d+(?:\.\d+)*/);
      return match ? match[0] : raw;
    }

    function showUpdatePrompt(release, current, releaseKey, autoUpdate) {
      const previous = escapeHtml(readStored(RELEASE_KEY) || "versión anterior");
      const label = escapeHtml(release && release.label ? release.label : APP_RELEASE);
      const publishedAt = escapeHtml(release && release.publishedAt ? release.publishedAt : "");
      const overlay = document.createElement("div");
      overlay.className = "update-overlay";
      overlay.setAttribute("role", "dialog");
      overlay.setAttribute("aria-modal", "true");
      overlay.innerHTML = `
        <div class="update-card">
          <div class="update-icon">↻</div>
          <h2>${autoUpdate ? "Actualizando OPAUSTRO" : "Actualización disponible"}</h2>
          <p>${autoUpdate ? "La web se está actualizando automáticamente. Espere un momento." : "Hay una nueva versión de OPAUSTRO lista para instalar antes de iniciar sesión."}</p>
          <div class="update-meta">
            <span>Actual: ${previous}</span>
            <strong>Nueva: ${label}</strong>
            ${publishedAt ? `<span>Publicada: ${publishedAt}</span>` : ""}
          </div>
          <div class="update-progress" ${autoUpdate ? "" : "hidden"}>
            <div class="update-progress-track" aria-hidden="true"><div class="update-progress-bar"></div></div>
            <div class="update-progress-label" role="status" aria-live="polite">Preparando actualización 0%</div>
          </div>
          <div class="update-actions" ${autoUpdate ? "hidden" : ""}>
            <button type="button" class="update-later">Más tarde</button>
            <button type="button" class="update-now">Actualizar ahora</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);

      const progress = overlay.querySelector(".update-progress");
      const progressBar = overlay.querySelector(".update-progress-bar");
      const progressLabel = overlay.querySelector(".update-progress-label");
      const laterButton = overlay.querySelector(".update-later");
      const nowButton = overlay.querySelector(".update-now");
      if (autoUpdate) {
        performUpdateInstall({ current, releaseKey, progress, progressBar, progressLabel, laterButton, nowButton, keepSession: true });
        return;
      }
      const closePrompt = () => overlay.remove();
      laterButton.addEventListener("click", closePrompt);
      nowButton.addEventListener("click", () => performUpdateInstall({ current, releaseKey, progress, progressBar, progressLabel, laterButton, nowButton, keepSession: false }));
    }

    function updateInstallProgress(progressBar, progressLabel, percent, message) {
      const value = Math.max(0, Math.min(100, Number(percent) || 0));
      progressBar.style.width = value + "%";
      progressLabel.textContent = message + " " + value + "%";
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function withTimeout(promise, ms) {
      return Promise.race([
        Promise.resolve(promise).catch(() => {}),
        wait(ms)
      ]);
    }

    async function warmAppShell(current, progressBar, progressLabel) {
      const assets = [
        "../VERSION.json?v=" + encodeURIComponent(current),
        "../manifest.webmanifest?v=" + encodeURIComponent(current),
        "../Recuros_imagenes/logo_color.png?v=1.0.0",
        "../Recuros_imagenes/icon-192.png?v=1.0.0",
        "../ICE_Pinguino/modulo_Ice.html?v=" + encodeURIComponent(current),
        "../ICE_Pinguino/resumen.html?v=" + encodeURIComponent(current),
        "../ICE_Pinguino/inventario.html?v=" + encodeURIComponent(current),
        "../ICE_Pinguino/reportes.html?v=" + encodeURIComponent(current),
        "../Ventas/bi_ventas.html?v=" + encodeURIComponent(current),
        "../Ventas/bi_vendedor.html?v=" + encodeURIComponent(current),
        "../Ventas/ventas.html?v=" + encodeURIComponent(current),
        "../Logistica/cabinets.html?v=" + encodeURIComponent(current),
        "../Gerencia/tablero.html?v=" + encodeURIComponent(current)
      ];
      let done = 0;
      for (const asset of assets) {
        await withTimeout(fetch(asset, { cache: "reload" }), 3000);
        done += 1;
        updateInstallProgress(progressBar, progressLabel, 55 + Math.round((done / assets.length) * 30), "Descargando actualización");
      }
    }

    async function performUpdateInstall({ current, releaseKey, progress, progressBar, progressLabel, laterButton, nowButton, keepSession }) {
      if (laterButton) laterButton.disabled = true;
      if (nowButton) {
        nowButton.disabled = true;
        nowButton.textContent = "Actualizando...";
      }
      progress.hidden = false;

      let finished = false;
      const finishAndReload = () => {
        if (finished) return;
        finished = true;
        updateInstallProgress(progressBar, progressLabel, 100, "Actualizado. Espere un momento");
        writeStored(RELEASE_KEY, releaseKey || releaseKeyOf(null, current));
        const target = location.pathname + "?v=" + encodeURIComponent(current) + "&t=" + Date.now();
        setTimeout(() => location.replace(target), 700);
      };
      // Tope absoluto: pase lo que pase (red lenta, pestana en segundo plano, error inesperado),
      // la actualizacion nunca debe quedarse colgada mas de 12 segundos.
      const safetyTimer = setTimeout(finishAndReload, 12000);

      try {
        updateInstallProgress(progressBar, progressLabel, 5, "Preparando actualización");
        await wait(200);
        if ("serviceWorker" in navigator) {
          updateInstallProgress(progressBar, progressLabel, 20, "Revisando componentes");
          await withTimeout(
            navigator.serviceWorker.getRegistrations().then((registrations) =>
              Promise.all(registrations.map((registration) => registration.unregister()))
            ),
            2500
          );
        }
        await wait(200);
        if ("caches" in window) {
          updateInstallProgress(progressBar, progressLabel, 40, "Limpiando caché anterior");
          await withTimeout(
            caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key)))),
            2500
          );
        }
        if (!keepSession) {
          removeStored(SESSION_KEY);
          removeStored(ACTIVE_MODULE_KEY);
        }
        await warmAppShell(current, progressBar, progressLabel);
      } catch (error) {
        // Cualquier fallo aqui no debe impedir que la actualizacion termine.
      } finally {
        clearTimeout(safetyTimer);
        finishAndReload();
      }
    }

    let updateCheckInFlight = false;
    async function checkReleaseVersion() {
      if (state.currentSession) return; // No interrumpir una sesion activa: se revisa al salir o cerrar sesion.
      if (updateCheckInFlight) return;
      updateCheckInFlight = true;
      try {
        const response = await fetch("../VERSION.json?v=" + Date.now(), { cache: "no-store" });
        if (!response.ok) return;
        const release = await response.json();
        const current = release && release.version ? String(release.version) : APP_VERSION;
        const releaseKey = releaseKeyOf(release, current);
        const stored = readStored(RELEASE_KEY);
        const forced = release && (release.forceUpdate === true || release.rollback === true);
        const needsUpdate = stored && stored !== releaseKey;
        if (needsUpdate && !document.querySelector(".update-overlay")) {
          showUpdatePrompt(release, current, releaseKey, !isInstalledApp() || forced);
          return;
        }
        writeStored(RELEASE_KEY, releaseKey);
      } catch (error) {
      } finally {
        updateCheckInFlight = false;
      }
    }

    function loadLoginData() {
      if (window.google && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler((response) => {
            if (!response || !response.success) {
              setMessage("No se pudo preparar el acceso. Intente nuevamente.", "error");
              return;
            }
            renderRoles(response.usersByRole);
            setMessage("", "");
          })
          .withFailureHandler(() => {
            setMessage("No se pudo preparar el acceso. Intente nuevamente.", "error");
          })
          .getLoginData();
        return;
      }

      if (!LOGIN_API_URL) {
        renderRoles({});
        setMessage("Configura LOGIN_API_URL para validar usuarios reales. Por seguridad no se permite acceso local con contraseñas libres.", "error");
        return;
      }
      callLoginApi("getLoginData", {}).then((response) => {
        if (!response || !response.success) {
          setMessage((response && (response.detail || response.message)) || "No se pudo preparar el acceso.", "error");
          return;
        }
        renderRoles(response.usersByRole);
      }).catch(() => setMessage("No se pudo conectar con Login API.", "error"));
    }

    async function callLoginApi(action, payload) {
      if (!LOGIN_API_URL) {
        throw new Error("Configura LOGIN_API_URL con la URL /exec del Apps Script de Login para pruebas locales.");
      }
      const response = await fetch(LOGIN_API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        cache: "no-store",
        body: JSON.stringify({ action, payload })
      });
      if (!response.ok) throw new Error("No se pudo contactar el servicio de Login.");
      return response.json();
    }

    function authenticate(payload) {
      return new Promise((resolve, reject) => {
        if (window.google && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            .authenticate(payload);
          return;
        }
        callLoginApi("authenticate", payload).then(resolve).catch(reject);
      });
    }

    function accessLogKey() {
      return "opaustro_access_log";
    }

    function pendingAccessLogKey() {
      return "opaustro_access_log_pending";
    }

    function readAccessEntries(key) {
      try {
        return JSON.parse(localStorage.getItem(key) || "[]").filter(Boolean);
      } catch (error) {
        return [];
      }
    }

    function writeAccessEntries(key, entries, limit) {
      try {
        localStorage.setItem(key, JSON.stringify((entries || []).slice(-(limit || 5000))));
      } catch (error) {}
    }

    function recordAccessLog(session, credentials) {
      try {
        const key = accessLogKey();
        const current = readAccessEntries(key);
        const user = String((session && (session.user || session.usuario || session.nombre)) || (credentials && credentials.user) || "").trim();
        const role = String((session && (session.role || session.rol)) || (credentials && credentials.role) || "").trim();
        if (!user || !role) return;
        if (session && !session.sessionId) session.sessionId = `${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
        const entry = {
          id: session && session.sessionId ? session.sessionId : `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
          user,
          role,
          at: new Date().toISOString(),
          version: APP_VERSION,
          device: isInstalledApp() ? "app_instalada" : "web",
          userAgent: navigator.userAgent || "",
          env: appEnv()
        };
        current.push(entry);
        writeAccessEntries(key, current, 5000);
        queueAccessLog(entry);
        flushAccessLogQueue();
      } catch (error) {}
    }

    async function postSessionAction(action, payload) {
      if (!LOGIN_API_URL || !payload) return false;
      try {
        const response = await fetch(LOGIN_API_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          cache: "no-store",
          body: JSON.stringify({ action, payload }),
          keepalive: true
        });
        return response.ok;
      } catch (error) {
        return false;
      }
    }

    function sessionHeartbeatPayload(session) {
      if (!session) return null;
      if (!session.sessionId) session.sessionId = `${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
      return {
        sessionId: session.sessionId,
        user: session.user || session.usuario || session.nombre || "",
        role: session.role || session.rol || "",
        startedAt: session.startedAt || new Date().toISOString(),
        version: APP_VERSION,
        device: isInstalledApp() ? "app_instalada" : "web",
        userAgent: navigator.userAgent || ""
      };
    }

    function startSessionHeartbeat(session) {
      stopSessionHeartbeat(false);
      if (!session) return;
      if (!session.startedAt) session.startedAt = new Date().toISOString();
      const send = () => postSessionAction("recordSessionHeartbeat", sessionHeartbeatPayload(session));
      send();
      heartbeatTimer = setInterval(send, 30000);
    }

    function stopSessionHeartbeat(notifyEnd) {
      if (heartbeatTimer) clearInterval(heartbeatTimer);
      heartbeatTimer = null;
      if (notifyEnd && state.currentSession && state.currentSession.sessionId) {
        postSessionAction("endSession", { sessionId: state.currentSession.sessionId });
      }
    }

    function queueAccessLog(entry) {
      if (!entry || !entry.id) return;
      const pending = readAccessEntries(pendingAccessLogKey());
      if (!pending.some((item) => item && item.id === entry.id)) pending.push(entry);
      writeAccessEntries(pendingAccessLogKey(), pending, 1000);
    }

    async function postAccessLog(entry) {
      if (!LOGIN_API_URL || !entry) return false;
      try {
        const response = await fetch(LOGIN_API_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          cache: "no-store",
          body: JSON.stringify({ action: "recordAccessLog", payload: entry }),
          keepalive: true
        });
        if (!response.ok) return false;
        const data = await response.json().catch(() => null);
        return Boolean(data && data.success);
      } catch (error) {
        return false;
      }
    }

    async function flushAccessLogQueue() {
      const pending = readAccessEntries(pendingAccessLogKey());
      if (!pending.length || !LOGIN_API_URL) return;
      const remaining = [];
      for (const entry of pending) {
        const ok = await postAccessLog(entry);
        if (!ok) remaining.push(entry);
      }
      writeAccessEntries(pendingAccessLogKey(), remaining, 1000);
    }

    function normalizeRoleName(role) {
      return String(role || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[\s-]+/g, "_")
        .toUpperCase();
    }

    function normalizePersonName(name) {
      return String(name || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toUpperCase();
    }

    function modulesForRole(role) {
      const normalized = normalizeRoleName(role);
      if (normalized === "ADMIN" || normalized === "ADMINISTRADOR") return ADMIN_GERENCIA_MODULES;
      if (normalized === "GERENCIA" || normalized === "GERENTE") return GERENCIA_ACCESS_MODULES;
      if (normalized === "LOGISTICA") return LOGISTICA_MODULES;
      if (normalized === "TECNICO" || normalized === "TECNICO_LOGISTICA") return ["Logistica"];
      if (normalized === "SUPERVISOR") return VENTAS_MODULES;
      if (normalized === "CARTERA") return CARTERA_MODULES;
      if (normalized === "VENDEDOR" || normalized === "VENTAS") return VENDEDOR_MODULES;
      if (normalized === "VENDEDORES_ICE" || normalized === "VENDEDOR_ICE" || normalized === "ICE") return ICE_OPERATIVO_MODULES;
      return null;
    }

    function expandModules(modules) {
      const expanded = [];
      (modules || []).forEach((moduleName) => {
        if (moduleName === "Admin") {
          ADMIN_GERENCIA_MODULES.forEach((adminModule) => {
            if (!expanded.includes(adminModule)) expanded.push(adminModule);
          });
          return;
        }
        if (/^(ICE|Ice|IceOperativo|IcePinguino)$/i.test(moduleName)) {
          ICE_OPERATIVO_MODULES.forEach((iceModule) => {
            if (!expanded.includes(iceModule)) expanded.push(iceModule);
          });
          return;
        }
        if (moduleName === "Ventas") {
          VENTAS_MODULES.forEach((ventasModule) => {
            if (!expanded.includes(ventasModule)) expanded.push(ventasModule);
          });
          return;
        }
        if (moduleName === "Gerencia") {
          GERENCIA_MODULES.forEach((gerenciaModule) => {
            if (!expanded.includes(gerenciaModule)) expanded.push(gerenciaModule);
          });
          return;
        }
        if (!expanded.includes(moduleName)) expanded.push(moduleName);
      });
      return expanded;
    }

    function visibleModulesForSession(session) {
      const role = session && (session.role || session.rol);
      const user = session && (session.user || session.usuario || session.nombre);
      const roleModules = modulesForRole(role);
      if (normalizeRoleName(role) === "SUPERVISOR" && ["JHONNY CHAFLA", "JHONY CHAFLA"].includes(normalizePersonName(user))) {
        return expandModules([...VENTAS_MODULES, ...ICE_ADMIN_MODULES]);
      }
      return expandModules(roleModules || (session && session.modules) || []);
    }

    function preferredInitialModule(session, visibleModules) {
      const normalized = normalizeRoleName(session && (session.role || session.rol));
      if ((normalized === "VENDEDORES_ICE" || normalized === "VENDEDOR_ICE" || normalized === "ICE") && visibleModules.includes("IceEscaneo")) return "IceEscaneo";
      if ((normalized === "ADMIN" || normalized === "ADMINISTRADOR" || normalized === "GERENCIA" || normalized === "GERENTE") && visibleModules.includes("VentasOperativo")) return "VentasOperativo";
      return "";

    function areaGroupsForSession(session) {

    function visibleAreaGroups(visibleModules, session = state.currentSession) {

    function setConnectionStatus(status, text) {

    // Cuando el usuario hace zoom con el gesto tactil (pellizcar), el navegador
    // escala TODA la pagina visible, incluido el encabezado fijo y la barra
    // inferior. La Visual Viewport API informa en tiempo real cuanto escalo y
    // desplazo el navegador la pagina; con esa info se aplica una transformacion
    // inversa solo al encabezado y a la barra inferior para que se vean siempre
    // del mismo tamano y en su lugar, mientras el contenido (el iframe del
    // modulo) si queda ampliado por el zoom nativo.
    function setupPinchZoomGuard() {
      if (!window.visualViewport) return;
      const vv = window.visualViewport;
      function update() {
        const app = $("#appScreen");
        if (!app || !app.classList.contains("is-mobile-layout")) return;
        const scale = vv.scale || 1;
        const header = document.querySelector(".app-topbar");
        const bottomNav = document.querySelector(".bottom-nav");
        const inverse = scale > 1.001 ? 1 / scale : 1;
        if (header) {
          header.style.transform = inverse === 1 ? "" : `translate(${vv.offsetLeft}px, ${vv.offsetTop}px) scale(${inverse})`;
          header.style.transformOrigin = "top left";
        }
        if (bottomNav) {
          const layoutHeight = document.documentElement.clientHeight;
          const translateY = (vv.offsetTop + vv.height) - layoutHeight;
          bottomNav.style.transform = inverse === 1 ? "" : `translate(${vv.offsetLeft}px, ${translateY}px) scale(${inverse})`;
          bottomNav.style.transformOrigin = "bottom left";
        }
      }
      vv.addEventListener("resize", update);
      vv.addEventListener("scroll", update);
    }
    setupPinchZoomGuard();

    window.addEventListener("message", (event) => {
      const data = event.data || {};
      if (data.type !== "opaustro-module-status") return;
      if (data.status === "ok") setConnectionStatus("ok", data.message || "Conectado");
      else if (data.status === "err") setConnectionStatus("err", data.message || "Sin conexión");
      else setConnectionStatus("warn", data.message || "Verificando");
    });


    function roleForIce(role, session = {}) {
      const normalized = String(role || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
      if (normalized === "ADMIN" || normalized === "ADMINISTRADOR") return "ADMIN";
      if (normalized === "GERENCIA" || normalized === "GERENTE") return "GERENCIA";
      if (normalized === "SUPERVISOR" && ["JHONNY CHAFLA", "JHONY CHAFLA"].includes(normalizePersonName(session.user || session.usuario || session.nombre))) return "GERENCIA";
      return "VENDEDOR";
    }

    function sessionNeedsIceToken(session) {
      const expanded = visibleModulesForSession(session || {});
      return expanded.some((moduleName) => moduleName.startsWith("Ice"));
    }

    async function postIceAction(body) {
      const response = await fetch(ICE_API_URL, {
        method: "POST",
        redirect: "follow",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        cache: "no-store",
        body: JSON.stringify(body)
      });
      if (!response.ok) throw new Error("No se pudo contactar ICE por POST.");
      return readJsonResponse(response, "ICE API");
    }

    async function requestIceLogin(session, credentials) {
      const usuario = (credentials && credentials.user) || session.user || session.usuario || "";
      const rol = roleForIce((credentials && credentials.role) || session.role || session.rol, session);
      if (credentials && credentials.password) {
        try {
          const passwordLogin = { action: "login", usuario, password: credentials.password, rol };
          const result = await postIceAction(passwordLogin);
          if (result && result.ok && result.token) return result;
        } catch (error) {
          // El login principal ya validó la identidad. Si la segunda validación ICE falla,
          // se continúa con el token delegado para no bloquear módulos funcionales.
        }
      }
      return postIceAction({
        action: "principalLogin",
        usuario,
        rol,
        principal: "OPAUSTRO_LOGIN",
        issuedAt: String(Date.now())
      });
    }

    async function prepareIceToken(session, credentials = {}) {
      if (!sessionNeedsIceToken(session) || session.iceToken || !ICE_API_URL) return session;
      try {
        const result = await requestIceLogin(session, credentials);
        if (!result || !result.ok || !result.token) {
          throw new Error(result && result.message ? result.message : "No se pudo preparar el acceso a ICE.");
        }
        return {
          ...session,
          iceToken: result.token,
          iceUser: result.user || null,
          moduleErrors: { ...(session.moduleErrors || {}), ICE: "" }
        };
      } catch (error) {
        return {
          ...session,
          iceToken: "",
          moduleErrors: {
            ...(session.moduleErrors || {}),
            ICE: error && error.message ? error.message : "ICE no pudo preparar datos."
          }
        };
      }
    }

    function isIceModule(moduleName) {
      return /^Ice/.test(String(moduleName || ""));
    }

    function buildModuleSrc(module, moduleName, session) {
      const url = new URL(module.path, location.href);
      url.searchParams.set("v", APP_VERSION);
      url.searchParams.set("t", Date.now());
      if (isIceModule(moduleName) && session.iceToken) {
        url.searchParams.set("iceToken", session.iceToken);
        url.searchParams.set("token", session.iceToken);
        url.searchParams.set("usuario", session.user || session.usuario || "");
        url.searchParams.set("nombre", session.user || session.usuario || "");
        url.searchParams.set("perfil", roleForIce(session.role || session.rol || "ADMIN", session));
      }
      return url.pathname + url.search + url.hash;
    }

    function startIcePreparation(session, credentials = {}) {
      if (!sessionNeedsIceToken(session) || session.iceToken || !ICE_API_URL) return Promise.resolve(session);
      if (icePreparationPromise) return icePreparationPromise;
      icePreparationPromise = prepareIceToken(session, credentials).then((updated) => {
        state.currentSession = updated;
        persistSession(updated);
        icePreparationPromise = null;
        const active = readStored(ACTIVE_MODULE_KEY);
        if (isIceModule(active) && updated.iceToken) activateModule(active, updated, false);
        return updated;
      }).catch((error) => {
        icePreparationPromise = null;
        const updated = {
          ...session,
          iceToken: "",
          moduleErrors: {
            ...(session.moduleErrors || {}),
            ICE: error && error.message ? error.message : "ICE no pudo preparar datos."
          }
        };
        state.currentSession = updated;
        persistSession(updated);
        return updated;
      });
      return icePreparationPromise;
    }

    function renderApp(session, credentials) {
      state.currentSession = session;
      if (!state.currentSession.sessionId) state.currentSession.sessionId = `${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
      if (!state.currentSession.startedAt) state.currentSession.startedAt = new Date().toISOString();
      persistSession(session);
      startSessionHeartbeat(state.currentSession);
      $("#loginScreen").classList.add("is-hidden");
      $("#appScreen").classList.remove("is-hidden");
      applyResponsiveMode();
      $("#sessionUser").textContent = session.user || "Usuario";
      $("#sessionRole").textContent = session.role === "admin" ? "Administrador" : session.role;
      renderHeaderAvatar(session.fotoPerfil);

      const visibleModules = visibleModulesForSession(session);
      state.visibleModules = visibleModules;
      renderModuleGroups(session, visibleModules);

      const savedModule = readStored(ACTIVE_MODULE_KEY);
      const hashModule = decodeURIComponent(String(location.hash || "").replace(/^#/, ""));
      const preferredModule = preferredInitialModule(session, visibleModules);
      const firstModule = visibleModules.includes(hashModule)
        ? hashModule
        : (visibleModules.includes(savedModule) ? savedModule : (preferredModule || visibleModules[0]));
      if (firstModule) activateModule(firstModule, session, false);
      if (firstModule) history.replaceState({ moduleName: firstModule }, "", "#" + encodeURIComponent(firstModule));
      resetIdleTimer();

      if (session.debeCambiarClave) {
        openPasswordOverlay({ forced: true, prefillActual: credentials && credentials.password });
      }
    }

    function currentSessionIdentity() {
      const session = state.currentSession || {};
      return {
        usuario: session.usuario || session.user || "",
        rol: session.role || session.rol || ""
      };
    }

    function renderHeaderAvatar(fotoPerfil) {
      const icon = $("#headerAvatarIcon");
      const img = $("#headerAvatarImg");
      if (fotoPerfil) {
        img.src = fotoPerfil;
        img.style.display = "";
        icon.style.display = "none";
      } else {
        img.removeAttribute("src");
        img.style.display = "none";
        icon.style.display = "";
      }
    }

    function openPasswordOverlay(opts) {
      opts = opts || {};
      if (document.querySelector(".pwd-overlay")) return;
      const forced = !!opts.forced;
      const prefillActual = opts.prefillActual || "";
      const overlay = document.createElement("div");
      overlay.className = "update-overlay pwd-overlay";
      overlay.setAttribute("role", "dialog");
      overlay.setAttribute("aria-modal", "true");
      overlay.innerHTML = `
        <div class="update-card">
          <div class="update-icon">🔑</div>
          <h2>${forced ? "Cambia tu contraseña" : "Cambiar contraseña"}</h2>
          <p>${forced ? "Por seguridad, debes establecer una contraseña propia antes de continuar." : "Ingresa tu contraseña actual y la nueva contraseña."}</p>
          <form id="pwdForm" autocomplete="off">
            <div class="pwd-field" ${prefillActual ? "hidden" : ""}>
              <label for="pwdActual">Contraseña actual</label>
              <input id="pwdActual" name="pwdActual" type="password" ${prefillActual ? "" : "required"}>
            </div>
            <div class="pwd-field">
              <label for="pwdNueva">Nueva contraseña</label>
              <input id="pwdNueva" name="pwdNueva" type="password" required minlength="4">
            </div>
            <div class="pwd-field">
              <label for="pwdConfirma">Confirmar nueva contraseña</label>
              <input id="pwdConfirma" name="pwdConfirma" type="password" required minlength="4">
            </div>
            <p class="pwd-msg" style="color:#a32d2d;font-size:.85rem;min-height:1.1em;"></p>
            <div class="update-actions">
              <button type="button" class="update-later" id="pwdLater">${forced ? "Más tarde" : "Cancelar"}</button>
              <button type="submit" class="update-now" id="pwdSubmit">Guardar</button>
            </div>
          </form>
        </div>`;
      document.body.appendChild(overlay);

      const closeOverlay = () => overlay.remove();
      overlay.querySelector("#pwdLater").addEventListener("click", closeOverlay);
      const form = overlay.querySelector("#pwdForm");
      const msg = overlay.querySelector(".pwd-msg");
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        msg.textContent = "";
        const actual = prefillActual || overlay.querySelector("#pwdActual").value.trim();
        const nueva = overlay.querySelector("#pwdNueva").value.trim();
        const confirma = overlay.querySelector("#pwdConfirma").value.trim();
        if (!actual) { msg.textContent = "Ingresa tu contraseña actual."; return; }
        if (nueva.length < 4) { msg.textContent = "La nueva contraseña debe tener al menos 4 caracteres."; return; }
        if (nueva !== confirma) { msg.textContent = "Las contraseñas no coinciden."; return; }
        const submitButton = overlay.querySelector("#pwdSubmit");
        submitButton.disabled = true;
        submitButton.textContent = "Guardando...";
        try {
          const identity = currentSessionIdentity();
          const response = await callLoginApi("changePassword", { rol: identity.rol, usuario: identity.usuario, actual, nueva });
          if (!response || !response.success) {
            msg.textContent = (response && response.message) || "No se pudo actualizar la contraseña.";
            return;
          }
          if (state.currentSession) state.currentSession.debeCambiarClave = false;
          persistSession(state.currentSession);
          closeOverlay();
        } catch (error) {
          msg.textContent = "No se pudo contactar el servidor. Intenta de nuevo.";
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "Guardar";
        }
      });
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error("No se pudo leer la imagen."));
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      });
    }

    async function compressProfilePhoto(file) {
      const dataUrl = await fileToDataUrl(file);
      const img = document.createElement("img");
      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = () => reject(new Error("Imagen invalida."));
        img.src = dataUrl;
      });
      const max = 480;
      let w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
      if (w > h) { if (w > max) { h = Math.round(h * max / w); w = max; } }
      else if (h > max) { w = Math.round(w * max / h); h = max; }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      return canvas.toDataURL("image/jpeg", 0.75);
    }

    function openProfileOverlay() {
      if (document.querySelector(".profile-overlay")) return;
      const session = state.currentSession || {};
      const identity = currentSessionIdentity();
      const overlay = document.createElement("div");
      overlay.className = "update-overlay profile-overlay";
      overlay.setAttribute("role", "dialog");
      overlay.setAttribute("aria-modal", "true");
      const fotoActual = session.fotoPerfil || "";
      overlay.innerHTML = `
        <div class="update-card">
          <div class="update-icon">👤</div>
          <h2>Mi perfil</h2>
          <div class="profile-meta">
            <div><strong>${escapeHtml(session.user || identity.usuario || "Usuario")}</strong></div>
            <div>${escapeHtml(identity.rol === "admin" ? "Administrador" : identity.rol)} · ${escapeHtml(identity.usuario)}</div>
          </div>
          <div class="profile-photo-row">
            <img class="profile-photo-preview" id="profilePhotoPreview" src="${fotoActual ? escapeHtml(fotoActual) : ''}" alt="" ${fotoActual ? "" : 'style="display:none;"'}>
            <div class="profile-photo-actions">
              <label for="profilePhotoInput">📷 ${fotoActual ? "Cambiar foto" : "Subir foto"}</label>
              <input id="profilePhotoInput" type="file" accept="image/*" style="display:none;">
              <span class="pwd-msg" id="profilePhotoMsg" style="color:#a32d2d;font-size:.8rem;"></span>
            </div>
          </div>
          <div class="update-actions">
            <button type="button" class="update-later" id="profileClose">Cerrar</button>
            <button type="button" class="update-now" id="profileChangePwd">Cambiar contraseña</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);

      const closeOverlay = () => overlay.remove();
      overlay.querySelector("#profileClose").addEventListener("click", closeOverlay);
      overlay.querySelector("#profileChangePwd").addEventListener("click", () => {
        closeOverlay();
        openPasswordOverlay({ forced: false });
      });
      const photoInput = overlay.querySelector("#profilePhotoInput");
      const photoMsg = overlay.querySelector("#profilePhotoMsg");
      photoInput.addEventListener("change", async () => {
        const file = photoInput.files && photoInput.files[0];
        if (!file) return;
        photoMsg.textContent = "Subiendo foto...";
        try {
          const foto = await compressProfilePhoto(file);
          const response = await callLoginApi("updateProfilePhoto", { rol: identity.rol, usuario: identity.usuario, foto });
          if (!response || !response.success) {
            photoMsg.textContent = (response && response.message) || "No se pudo guardar la foto.";
            return;
          }
          photoMsg.textContent = "";
          const preview = overlay.querySelector("#profilePhotoPreview");
          preview.src = foto;
          preview.style.display = "";
          if (state.currentSession) state.currentSession.fotoPerfil = response.url || foto;
          persistSession(state.currentSession);
          renderHeaderAvatar((state.currentSession && state.currentSession.fotoPerfil) || foto);
        } catch (error) {
          photoMsg.textContent = "No se pudo subir la foto. Intenta de nuevo.";
        } finally {
          try { photoInput.value = ""; } catch (error) {}
        }
      });
    }

    function activateModule(moduleName, session, pushHistory) {
      const module = MODULE_DEFINITIONS[moduleName] || { label: moduleName };
      const currentModule = readStored(ACTIVE_MODULE_KEY);
      const existingFrame = $("#blankPanel .module-frame");
      if (currentModule === moduleName && existingFrame) {
        $("#appScreen").classList.remove("sidebar-open");
        resetIdleTimer();
        return;
      }
      document.querySelectorAll(".module-link").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.module === moduleName);
      });
      $("#activeModuleTitle").textContent = module.label;
      $("#topModuleTitle").textContent = module.label;
      $("#activeModuleMode").textContent = session.permissions === "lectura" ? "Solo lectura" : "Acceso autorizado";
      writeStored(ACTIVE_MODULE_KEY, moduleName);
      setConnectionStatus(module.embed ? "warn" : "warn", module.embed ? "Conectando" : "Sin base de datos");
      const panel = $("#blankPanel");
      panel.classList.toggle("module-host", !!module.embed);
      if (isIceModule(moduleName) && !session.iceToken) {
        panel.classList.remove("module-host");
        panel.innerHTML = `<div class="module-error"><strong>Preparando ICE...</strong><p>Usando la sesión validada del login principal. Espere un momento.</p></div>`;
        setConnectionStatus("warn", "ICE preparando");
        const preparation = icePreparationPromise || startIcePreparation(session, { role: session.role, user: session.user });
        preparation.then((updated) => {
          if (readStored(ACTIVE_MODULE_KEY) !== moduleName) return;
          if (updated && updated.iceToken) {
            activateModule(moduleName, updated, false);
          } else {
            const reason = (updated && updated.moduleErrors && updated.moduleErrors.ICE) || "No se pudo preparar el acceso seguro a ICE.";
            panel.innerHTML = `<div class="module-error"><strong>ICE no disponible temporalmente.</strong><p>${escapeHtml(reason)}</p><p>Los demás módulos pueden seguir usándose con normalidad.</p></div>`;
            setConnectionStatus("err", "ICE sin conexión");
          }
        });
      } else if (module.embed) {
        const src = buildModuleSrc(module, moduleName, session);
        panel.innerHTML = `<iframe class="module-frame" src="${src}" title="${module.label}" loading="eager"></iframe>`;
        const frame = panel.querySelector("iframe");
        if (frame) {
          applyContentZoom();
          frame.addEventListener("load", () => setTimeout(() => {
            if (readStored(ACTIVE_MODULE_KEY) === moduleName) setConnectionStatus("ok", "Conectado");
            applyResponsiveMode();
            try { frame.contentWindow.dispatchEvent(new Event("resize")); } catch (error) {}
          }, 700));
          frame.addEventListener("error", () => setConnectionStatus("err", "Sin conexión"));
        }
      } else {
        panel.innerHTML = `<p>El módulo ${module.label} está listo para recibir su contenido.</p>`;
        setConnectionStatus("warn", "Sin base de datos");
      }
      updateContentZoomVisibility();
      $("#appScreen").classList.remove("sidebar-open");
      if (pushHistory) history.pushState({ moduleName }, "", "#" + encodeURIComponent(moduleName));
      resetIdleTimer();
    }

    const CONTENT_ZOOM_KEY = "opaustro_content_zoom";
    const CONTENT_ZOOM_MIN = 0.6;
    const CONTENT_ZOOM_MAX = 2;
    const CONTENT_ZOOM_STEP = 0.1;
    let contentZoom = Number(readStored(CONTENT_ZOOM_KEY)) || 1;
    if (Number.isNaN(contentZoom) || contentZoom < CONTENT_ZOOM_MIN || contentZoom > CONTENT_ZOOM_MAX) contentZoom = 1;

    function applyContentZoom() {
      const frame = $("#blankPanel .module-frame");
      const resetBtn = $("#zoomResetBtn");
      if (resetBtn) resetBtn.textContent = Math.round(contentZoom * 100) + "%";
      const outBtn = $("#zoomOutBtn");
      const inBtn = $("#zoomInBtn");
      if (outBtn) outBtn.disabled = contentZoom <= CONTENT_ZOOM_MIN + 0.001;
      if (inBtn) inBtn.disabled = contentZoom >= CONTENT_ZOOM_MAX - 0.001;
      if (!frame) return;
      frame.style.transform = `scale(${contentZoom})`;
      frame.style.width = (100 / contentZoom) + "%";
      frame.style.height = (100 / contentZoom) + "%";
    }

    function setContentZoom(value) {
      contentZoom = Math.max(CONTENT_ZOOM_MIN, Math.min(CONTENT_ZOOM_MAX, value));
      writeStored(CONTENT_ZOOM_KEY, String(contentZoom));
      applyContentZoom();
    }

    function updateContentZoomVisibility() {
      const float = $("#contentZoomFloat");
      if (!float) return;
      const hasFrame = !!$("#blankPanel .module-frame");
      float.hidden = !hasFrame;
    }

    function persistSession(session) {
      writeStored(SESSION_KEY, JSON.stringify({
        session,
        lastActivity: Date.now()
      }));
    }

    function restoreSession() {
      try {
        const raw = readStored(SESSION_KEY);
        if (!raw) return false;
        const saved = JSON.parse(raw);
        if (!saved.session || Date.now() - Number(saved.lastActivity || 0) > SESSION_TIMEOUT_MS) {
          logout(true);
          return false;
        }
        renderApp(saved.session);
        return true;
      } catch (error) {
        return false;
      }
    }

    function resetIdleTimer() {
      if (!state.currentSession) return;
      persistSession(state.currentSession);
      clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(() => logout(true), SESSION_TIMEOUT_MS);
    }

    ["click", "keydown", "touchstart", "mousemove", "scroll"].forEach((eventName) => {
      window.addEventListener(eventName, resetIdleTimer, { passive: true });
    });

    function logout(expired) {
      stopSessionHeartbeat(true);
      state.currentSession = null;
      clearTimeout(inactivityTimer);
      removeStored(SESSION_KEY);
      removeStored(ACTIVE_MODULE_KEY);
      $("#appScreen").classList.add("is-hidden");
      $("#appScreen").classList.remove("sidebar-open");
      $("#loginScreen").classList.remove("is-hidden");
      form.reset();
      renderUsers("");
      setMessage(expired ? "Sesión cerrada por inactividad." : "", expired ? "error" : "");
      $("#password").type = "password";
      $("#togglePassword").textContent = "Ver";
      history.replaceState({}, "", location.pathname);
      checkReleaseVersion();
    }

    roleSelect.addEventListener("change", () => {
      renderUsers(roleSelect.value);
      setMessage("", "");
    });

    $("#togglePassword").addEventListener("click", () => {
      const password = $("#password");
      const isPassword = password.type === "password";
      password.type = isPassword ? "text" : "password";
      $("#togglePassword").textContent = isPassword ? "Ocultar" : "Ver";
      password.focus();
    });

    $("#logoutButton").addEventListener("click", () => logout(false));
    $("#profileButton").addEventListener("click", () => openProfileOverlay());
    $(".menu-toggle").addEventListener("click", () => {
      const app = $("#appScreen");
      applyResponsiveMode();
      if (app.classList.contains("is-mobile-layout")) app.classList.toggle("sidebar-open");
      else app.classList.toggle("sidebar-expanded");
    });

    document.addEventListener("click", (event) => {
      const app = $("#appScreen");
      if (!app || app.hidden) return;
      const target = event.target;
      const insideSidebar = target.closest && target.closest(".module-sidebar");
      const insideMenuButton = target.closest && target.closest(".menu-toggle");
      const insideBottom = target.closest && target.closest("#bottomModules");
      if (app.classList.contains("sidebar-open") && !insideSidebar && !insideMenuButton) {
        app.classList.remove("sidebar-open");
      }
      if (!insideBottom) restoreBottomGroups();
    });

    window.addEventListener("popstate", (event) => {
      if (!state.currentSession) return;
      const storedModule = readStored(ACTIVE_MODULE_KEY);
      const moduleName = (event.state && event.state.moduleName) || storedModule;
      if (moduleName) {
        activateModule(moduleName, state.currentSession, false);
        history.replaceState({ moduleName }, "", "#" + encodeURIComponent(moduleName));
      }
    });
    window.addEventListener("online", flushAccessLogQueue);
    window.addEventListener("focus", flushAccessLogQueue);
    window.addEventListener("focus", checkReleaseVersion);
    $("#zoomOutBtn").addEventListener("click", () => setContentZoom(contentZoom - CONTENT_ZOOM_STEP));
    $("#zoomInBtn").addEventListener("click", () => setContentZoom(contentZoom + CONTENT_ZOOM_STEP));
    $("#zoomResetBtn").addEventListener("click", () => setContentZoom(1));
    window.addEventListener("beforeunload", () => {
      if (state.currentSession && state.currentSession.sessionId) {
        postSessionAction("endSession", { sessionId: state.currentSession.sessionId });
      }
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setMessage("", "");
      submitButton.disabled = true;
      submitButton.textContent = "Validando...";

      try {
        const credentials = {
          role: roleSelect.value,
          user: (normalizeRoleName(roleSelect.value) === "VENDEDOR" ? userTyped.value : userSelect.value).trim(),
          password: $("#password").value.trim()
        };
        let response = await authenticate(credentials);

        if (!response || !response.success) {
          setMessage(response && response.message ? response.message : "Credenciales no validas.", "error");
          return;
        }

        recordAccessLog(response, credentials);
        renderApp(response, credentials);
        startIcePreparation(response, credentials);
      } catch (error) {
        setMessage("No se pudo validar el acceso. Intente nuevamente.", "error");
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "Ingresar";
      }
    });

    const footerVersion = $("#loginFooterVersion");
    if (footerVersion) footerVersion.textContent = APP_VERSION;
    loadLoginData();
    flushAccessLogQueue();
    restoreSession();
    checkReleaseVersion();
  </script>
</body>
</html>
